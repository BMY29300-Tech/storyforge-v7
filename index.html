<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryForge v7 — Curious Rama</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0D0905;
  --s1: #181008;
  --s2: #221710;
  --s3: #2E2018;
  --border: #3A2A1E;
  --orange: #F08C1E;
  --orange-dim: #A85F10;
  --orange-glow: rgba(240,140,30,0.15);
  --teal: #2BB5A0;
  --teal-dim: #1A7060;
  --green: #5CBB7A;
  --red: #E05555;
  --purple: #9B7FD4;
  --text: #F0DEC8;
  --text-dim: #9A7A60;
  --text-faint: #4A3525;
  --r: 10px;
  --r-sm: 6px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Nunito', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  overflow: hidden;
  height: 100vh;
}
/* SIDEBAR */
#sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--s1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 0;
  overflow: hidden;
}
.logo {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border);
}
.logo-title {
  font-size: 15px;
  font-weight: 900;
  color: var(--orange);
  letter-spacing: -0.3px;
  line-height: 1.2;
}
.logo-sub {
  font-size: 10px;
  color: var(--text-dim);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 3px;
}
.logo-badge {
  display: inline-block;
  background: var(--orange-glow);
  border: 1px solid var(--orange-dim);
  color: var(--orange);
  font-size: 9px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 20px;
  margin-top: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.nav {
  flex: 1;
  padding: 12px 8px;
  overflow-y: auto;
}
.nav-section {
  font-size: 9px;
  font-weight: 700;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 8px 8px 4px;
  margin-top: 4px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: var(--r-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-dim);
  transition: all 0.15s;
  border: 1px solid transparent;
  margin-bottom: 2px;
}
.nav-item:hover { background: var(--s2); color: var(--text); }
.nav-item.active {
  background: var(--orange-glow);
  border-color: var(--orange-dim);
  color: var(--orange);
}
.nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
.nav-badge {
  margin-left: auto;
  background: var(--s3);
  color: var(--text-dim);
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 10px;
  min-width: 20px;
  text-align: center;
}
.nav-item.active .nav-badge { background: var(--orange-dim); color: var(--orange); }
.sidebar-bottom {
  padding: 12px 8px;
  border-top: 1px solid var(--border);
}
.settings-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: var(--r-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-dim);
  transition: all 0.15s;
  width: 100%;
  border: none;
  background: transparent;
}
.settings-btn:hover { background: var(--s2); color: var(--text); }
/* MAIN */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.topbar {
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 56px;
}
.topbar-title { font-size: 16px; font-weight: 900; color: var(--text); }
.topbar-sub { font-size: 12px; color: var(--text-dim); font-weight: 600; margin-top: 1px; }
.topbar-actions { display: flex; gap: 8px; align-items: center; }
.content {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}
/* BUTTONS */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 18px;
  border-radius: var(--r-sm);
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  font-family: inherit;
}
.btn-primary {
  background: var(--orange);
  color: #1A0A00;
}
.btn-primary:hover { background: #FFB040; transform: translateY(-1px); }
.btn-secondary {
  background: var(--s2);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--s3); }
.btn-teal {
  background: var(--teal-dim);
  color: var(--text);
  border: 1px solid var(--teal);
}
.btn-teal:hover { background: var(--teal); color: #000; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-xs { padding: 4px 9px; font-size: 11px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
/* INPUTS */
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 11px;
  font-weight: 800;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.field input, .field textarea, .field select {
  width: 100%;
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text);
  font-family: 'Nunito', inherit;
  font-size: 14px;
  font-weight: 600;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.15s;
}
.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--orange-dim);
}
.field textarea { resize: vertical; min-height: 70px; }
.field select { cursor: pointer; }
/* CARDS */
.card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  margin-bottom: 16px;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.card-title {
  font-size: 14px;
  font-weight: 800;
  color: var(--text);
}
.card-sub {
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 600;
  margin-top: 2px;
}
/* SCENE LIST */
.scene-item {
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 12px 14px;
  margin-bottom: 8px;
  display: grid;
  grid-template-columns: 32px 1fr auto;
  gap: 12px;
  align-items: start;
  transition: border-color 0.15s;
}
.scene-item:hover { border-color: var(--orange-dim); }
.scene-num {
  width: 32px;
  height: 32px;
  background: var(--s3);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 900;
  color: var(--orange);
  border: 1px solid var(--orange-dim);
  flex-shrink: 0;
}
.scene-body {}
.scene-location {
  font-size: 10px;
  font-weight: 700;
  color: var(--teal);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 4px;
}
.scene-action {
  font-size: 13px;
  color: var(--text);
  font-weight: 600;
  margin-bottom: 5px;
  line-height: 1.4;
}
.scene-dialogue {
  font-size: 12px;
  color: var(--orange);
  font-weight: 700;
  font-style: italic;
}
.scene-speaker {
  font-size: 10px;
  color: var(--text-dim);
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-right: 5px;
  font-style: normal;
}
.scene-actions { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
.img-thumb {
  width: 60px;
  height: 90px;
  border-radius: 4px;
  object-fit: cover;
  border: 1px solid var(--border);
  display: block;
  background: var(--s3);
}
.img-placeholder {
  width: 60px;
  height: 90px;
  border-radius: 4px;
  background: var(--s3);
  border: 1px dashed var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--text-faint);
}
/* STATUS */
.status-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.tag-done { background: rgba(92,187,122,0.15); color: var(--green); border: 1px solid rgba(92,187,122,0.3); }
.tag-pending { background: var(--s3); color: var(--text-dim); border: 1px solid var(--border); }
.tag-ep { background: var(--orange-glow); color: var(--orange); border: 1px solid var(--orange-dim); }
/* ALERT */
.alert {
  padding: 12px 16px;
  border-radius: var(--r-sm);
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.alert-warn { background: rgba(240,140,30,0.1); border: 1px solid var(--orange-dim); color: var(--orange); }
.alert-info { background: rgba(43,181,160,0.1); border: 1px solid var(--teal-dim); color: var(--teal); }
.alert-err { background: rgba(224,85,85,0.1); border: 1px solid var(--red); color: var(--red); }
/* LOADER */
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--orange);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }
/* PROGRESS */
.progress-bar {
  height: 4px;
  background: var(--s3);
  border-radius: 2px;
  overflow: hidden;
  margin: 8px 0;
}
.progress-fill {
  height: 100%;
  background: var(--orange);
  border-radius: 2px;
  transition: width 0.3s;
}
/* GRID */
.ep-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.ep-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  cursor: pointer;
  transition: all 0.15s;
}
.ep-card:hover { border-color: var(--orange-dim); transform: translateY(-2px); }
.ep-card-num { font-size: 10px; font-weight: 800; color: var(--orange); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.ep-card-title { font-size: 15px; font-weight: 900; color: var(--text); line-height: 1.3; margin-bottom: 8px; }
.ep-card-lesson { font-size: 12px; color: var(--text-dim); font-weight: 600; line-height: 1.4; margin-bottom: 12px; font-style: italic; }
.ep-card-stats { display: flex; gap: 8px; flex-wrap: wrap; }
/* GROK BATCH */
.batch-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 14px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  line-height: 1.7;
  max-height: 300px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
}
/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}
.modal {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 24px;
  width: 100%;
  max-width: 520px;
  max-height: 80vh;
  overflow-y: auto;
}
.modal-title { font-size: 18px; font-weight: 900; color: var(--text); margin-bottom: 6px; }
.modal-sub { font-size: 13px; color: var(--text-dim); font-weight: 600; margin-bottom: 20px; line-height: 1.5; }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
/* TABS */
.tab-row { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.tab-btn {
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 800;
  color: var(--text-dim);
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
  margin-bottom: -1px;
}
.tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); }
.tab-btn:hover:not(.active) { color: var(--text); }
/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }
/* HIDDEN */
.hidden { display: none !important; }
/* SEPARATOR */
hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
/* COLS */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
/* WELCOME */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.stat-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  text-align: center;
}
.stat-val { font-size: 28px; font-weight: 900; color: var(--orange); line-height: 1; }
.stat-label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 4px; }
/* IMAGE VIEWER MODAL */
.img-viewer {
  max-width: 90vw;
  max-height: 90vh;
  border-radius: var(--r);
  display: block;
}
/* COPY FLASH */
.copy-flash {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--teal);
  color: #000;
  font-size: 13px;
  font-weight: 800;
  padding: 10px 20px;
  border-radius: var(--r-sm);
  z-index: 9999;
  animation: fadeUp 0.2s ease;
  pointer-events: none;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
/* CHAR LOCK DISPLAY */
.char-lock {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}
.char-pill {
  padding: 4px 10px;
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
}
</style>
</head>

<div id="sidebar">

    </button>

</div>

<!-- MAIN -->
<div id="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-sub" id="topbar-sub">Curious Rama Production Studio</div>
    </div>
    <div class="topbar-actions" id="topbar-actions"></div>
  </div>
  <div class="content" id="content">
    <!-- VIEWS RENDERED HERE -->
  </div>

  <div class="modal">
    <div class="modal-title">⚙️ Settings</div>

<!-- IMAGE VIEWER MODAL -->

<script>
// ═══════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════
let state = {
  view: 'dashboard',
  episodes: [],
  currentEpId: null,
  generatingScript: false,
  generatingImages: {},
};

function loadState() {
  try {
    const eps = localStorage.getItem('cr_episodes');
    if (eps) state.episodes = JSON.parse(eps);
  } catch(e) {}
}

function saveEpisodes() {
  localStorage.setItem('cr_episodes', JSON.stringify(state.episodes));
  updateLibCount();
}

function getSettings() {
  try {
    return JSON.parse(localStorage.getItem('cr_settings') || '{}');
  } catch(e) { return {}; }
}

function updateLibCount() {
  const el = document.getElementById('lib-count');
  if (el) el.textContent = state.episodes.length;
}

// ═══════════════════════════════════════
// INDEXEDDB (IMAGES)
// ═══════════════════════════════════════
let db = null;
function openDB() {
  return new Promise((resolve, reject) => {
    if (db) return resolve(db);
    const req = indexedDB.open('CuriousRamaDB', 1);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('images')) {
        d.createObjectStore('images', { keyPath: 'id' });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}
async function saveImageDB(id, base64) {
  const d = await openDB();
  return new Promise((resolve, reject) => {
    const tx = d.transaction('images', 'readwrite');
    tx.objectStore('images').put({ id, data: base64, ts: Date.now() });
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}
async function getImageDB(id) {
  const d = await openDB();
  return new Promise((resolve) => {
    const tx = d.transaction('images', 'readonly');
    const req = tx.objectStore('images').get(id);
    req.onsuccess = () => resolve(req.result?.data || null);
    req.onerror = () => resolve(null);
  });
}
async function getAllImageKeys() {
  const d = await openDB();
  return new Promise((resolve) => {
    const tx = d.transaction('images', 'readonly');
    const req = tx.objectStore('images').getAllKeys();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => resolve([]);
  });
}

// ═══════════════════════════════════════
// CHARACTER & LOCATION LOCKS
// ═══════════════════════════════════════
const CHAR_LOCKS = {
  Rama: "10-year-old girl, long wavy orange-red hair shoulder-length, large expressive brown eyes, freckles on nose and cheeks, blue denim overalls, yellow t-shirt underneath, light skin, warm curious expression",
  Lily: "small tuxedo kitten, black body and head, white chest and paws, bright vivid green eyes, pink nose, long white whiskers",
  Spina: "small turtle, bright green head and limbs, brown shell with green swirl scroll pattern, large dark friendly round eyes, small smile",
  Mother: "woman with short brown bob hair, light skin with freckles, warm light green long-sleeve top, gentle warm smile, seated",
  Father: "man with short dark brown slightly wavy hair, olive sage green casual shirt sleeves rolled up, strong jaw, warm eyes, light skin, seated"
};
const LOC_LOCKS = {
  bedroom: "cozy child bedroom, warm golden sunset lighting through large window, colorful patchwork quilt bed with pink yellow blue green patches, animal drawings taped to wall, warm honey-oak wooden furniture, clear glass aquarium on dresser left side",
  kitchen: "farmhouse kitchen, sage green painted cabinets, large rectangular oak dining table, warm natural sunlight through windows, rustic warm tones",
  garden: "lush green garden, warm daylight, colorful flowers, grass, trees in background, warm sunlight",
  outside: "outdoor nature setting, warm daylight, green trees, blue sky with soft clouds, warm sunlight"
};
const STYLE_SUFFIX = "Pixar 3D CGI animation style, children educational animation, warm color palette, cinematic lighting, high quality render, 9:16 aspect ratio.";

function buildImagePrompt(scene) {
  const chars = (scene.characters || []).map(c => CHAR_LOCKS[c]).filter(Boolean);
  const loc = LOC_LOCKS[scene.location] || LOC_LOCKS.outside;
  const hint = scene.imagePromptHint || scene.action || '';
  return `${chars.join('. ')}. ${loc}. Scene: ${hint}. ${STYLE_SUFFIX}`;
}

// ═══════════════════════════════════════
// GEMINI API
// ═══════════════════════════════════════
async function callGemini(prompt) {
  const s = getSettings();
  if (!s.apiKey) throw new Error("No Groq API key. Go to Settings.");
  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + s.apiKey
    },
    body: JSON.stringify({
      model: "llama-3.3-70b-versatile",
      messages: [{ role: "user", content: prompt }],
      temperature: 0.8,
      max_tokens: 8192
    })
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || "HTTP " + res.status);
  }
  const data = await res.json();
  return data.choices?.[0]?.message?.content || "";
}

// ═══════════════════════════════════════
// IMAGEN API
// ═══════════════════════════════════════
async function callImagen(prompt) {
  const s = getSettings();
  if (!s.apiKey) throw new Error('No API key. Go to Settings.');
  const model = s.imagenModel || 'imagen-3.0-generate-002';
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:predict?key=${s.apiKey}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      instances: [{ prompt }],
      parameters: { sampleCount: 1, aspectRatio: '9:16', safetySetting: 'block_only_high' }
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  const b64 = data.predictions?.[0]?.bytesBase64Encoded;
  if (!b64) throw new Error('No image data in response');
  return `data:image/png;base64,${b64}`;
}

// ═══════════════════════════════════════
const SCRIPT_SYSTEM = `You are the script writer for "Curious Rama", a children's educational YouTube channel for ages 6-10.

BRAND VOICE: Warm, curious, adventurous. Life lesson lands through EXPERIENCE not lecture. No villains. Conflict comes from nature or challenge. Rama learns by doing, failing, and trying again.

LOCKED CHARACTERS:
- Rama: curious 10-year-old girl, orange-red wavy hair, freckles, blue overalls, yellow t-shirt
- Lily: small black-and-white tuxedo kitten
- Spina: small turtle with swirl-patterned shell, lives in glass tank
- Mother: short brown bob, light green top, warm and caring
- Father: dark brown hair, olive shirt, wise and calm

SCRIPT RULES:
1. Exactly 20 scenes, each ~6 seconds = 2 minutes total
2. Max 12 words per dialogue line, ZERO apostrophes
3. One clear visual action per scene
4. Life lesson felt through story experience, never stated directly until end
5. Characters: use only the locked characters above
6. Locations: bedroom, kitchen, garden, or outside

OUTPUT: Valid JSON ONLY. No markdown. No explanation. No code fences.

{
  "title": "Episode title with one emoji",
  "lesson": "One sentence life lesson",
  "theme": "main theme",
  "scenes": [
    {
      "id": 1,
      "location": "bedroom",
      "characters": ["Rama"],
      "action": "Rama sits at desk looking at drawing, tilts head",
      "dialogue": { "character": "Rama", "line": "This does not look right at all" },
      "imagePromptHint": "Rama at wooden desk, drawing paper, sunset light"
    }
  ]
}`;

async function generateScript(theme, lesson, epNum) {
  const prompt = `${SCRIPT_SYSTEM}\n\nEpisode Number: ${epNum}\nTheme: ${theme}\nLife Lesson: ${lesson}\n\nGenerate the complete 20-scene script now:`;
  const raw = await callGemini(prompt);
  // Clean response
  let clean = raw.trim();
  clean = clean.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/i, '');
  const json = JSON.parse(clean);
  return json;
}

// ═══════════════════════════════════════
// VIDEO PROMPT GENERATION
// ═══════════════════════════════════════
function buildGrokBatch(scenes, epNum) {
  // Scene Lock header
  return scenes.map(scene => {
    const charDescs = (scene.characters || []).map(c => {
      const d = { 
        Rama: 'orange-red wavy hair, blue overalls, yellow shirt, freckles, 10-year-old girl',
        Lily: 'tuxedo kitten, black and white, green eyes',
        Spina: 'small green turtle, swirl-patterned shell',
        Mother: 'short brown bob hair, light green top',
        Father: 'dark brown hair, olive shirt'
      };
      return `${c}: ${d[c] || c}`;
    }).join(' | ');
    
    const loc = scene.location;
    const locDesc = {
      bedroom: 'warm golden bedroom, patchwork quilt bed, animal drawings on wall',
      kitchen: 'farmhouse kitchen, sage green cabinets, large oak table',
      garden: 'lush green garden, warm daylight, flowers',
      outside: 'outdoor nature setting, warm sunlight, trees'
    }[loc] || 'warm outdoor setting';

    const dialogue = scene.dialogue?.line 
      ? `\n[DIALOGUE: ${scene.dialogue.character} says: "${scene.dialogue.line}"]`
      : '';

    return `=== EP${String(epNum).padStart(2,'0')} S${String(scene.id).padStart(2,'0')} ===
[SCENE LOCK — Characters must match exactly]
${charDescs}

Location: ${locDesc}
Action: ${scene.action}${dialogue}
Style: Pixar 3D CGI, warm color palette, children animation, 6 seconds, smooth motion
Aspect: 9:16
---`;
  }).join('\n\n');
}

async function genSceneImage(epId, sceneId) {
  const ep = state.episodes.find(e => e.id === epId);
  if (!ep) return;
  const scene = ep.scenes?.find(s => s.id === sceneId);
  if (!scene) return;
  
  const btn = document.getElementById(`img-btn-${epId}-${sceneId}`);
  const thumbEl = document.getElementById(`img-thumb-${epId}-${sceneId}`);
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'; }
  if (thumbEl) thumbEl.innerHTML = `<div class="img-placeholder"><span class="spinner"></span></div>`;

  try {
    const prompt = buildImagePrompt(scene);
    const imgData = await callImagen(prompt);
    
    // Save to IndexedDB
    const imgId = `${epId}_s${sceneId}`;
    await saveImageDB(imgId, imgData);
    
    // Update scene metadata
    scene.hasImage = true;
    saveEpisodes();
    
    // Update UI
    if (thumbEl) thumbEl.innerHTML = `<img class="img-thumb" src="${imgData}" onclick="openImageViewer('${imgData}')" style="cursor:pointer" />`;
    if (btn) { btn.disabled = false; btn.textContent = '🔄 Re-gen'; btn.className = 'btn btn-xs btn-secondary'; }
    
    flash(`✅ Scene ${sceneId} image saved`);
  } catch(e) {
    if (thumbEl) thumbEl.innerHTML = `<div class="img-placeholder" title="${e.message}">❌</div>`;
    if (btn) { btn.disabled = false; btn.textContent = 'Retry'; }
    flash(`❌ ${e.message.substring(0,50)}`);
  }
}

async function genAllImages(epId) {
  const ep = state.episodes.find(e => e.id === epId);
  if (!ep || !ep.scenes) return;
  
  const btn = document.querySelector('[onclick*="genAllImages"]');
  if (btn) { btn.disabled = true; btn.innerHTML = '⏳ Generating…'; }
  
  const scenes = ep.scenes.filter(s => !s.hasImage);
  for (const s of scenes) {
    await genSceneImage(epId, s.id);
    await new Promise(r => setTimeout(r, 500)); // rate limit protection
  }
  
  if (btn) { btn.disabled = false; btn.innerHTML = '🚀 Generate All'; }
  flash(`✅ All images done!`);
}

      <div class="batch-box">${escHtml(b1text)}</div>
    </div>
    <div id="pt2" class="hidden">
      <div style="display:flex;justify-content:flex-end;margin-bottom:8px">
        <button class="btn btn-teal btn-sm" onclick="copyText(${JSON.stringify(b2text)})">📋 Copy Batch 2</button>
      </div>
      <div class="batch-box">${escHtml(b2text)}</div>
    </div>
    <div id="pt3" class="hidden">
      <div style="display:flex;justify-content:flex-end;margin-bottom:8px">
        <button class="btn btn-teal btn-sm" onclick="copyText(${JSON.stringify(b3text)})">📋 Copy Batch 3</button>
      </div>
      <div class="batch-box">${escHtml(b3text)}</div>
    </div>
  `;
}

function showPromptTab(btn, id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['pt1','pt2','pt3'].forEach(t => {
    const el = document.getElementById(t);
    if (el) el.classList.toggle('hidden', t !== id);
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── LIBRARY ────────────────────────────
function renderLibrary(c) {
  setTopbar('Library', 'All episodes · Scripts · Images · Prompts · Growing with every production');
  const eps = state.episodes;
  
  if (eps.length === 0) {
    c.innerHTML = `<div class="card" style="text-align:center;padding:40px 20px">
      <div style="font-size:36px;margin-bottom:12px">📚</div>
      <div class="card-title">Library is empty</div>
      <div class="card-sub" style="margin-top:6px">Episodes appear here after you generate scripts.</div>
    </div>`;
    return;
  }

  c.innerHTML = `
    <div class="ep-grid" id="lib-grid">
      ${eps.slice().reverse().map(ep => `
        <div class="ep-card" onclick="openEpisode('${ep.id}')">
          <div class="ep-card-num">Episode ${ep.epNum || '?'} · ${new Date(ep.created).toLocaleDateString()}</div>
          <div class="ep-card-title">${ep.title || 'Untitled'}</div>
          <div class="ep-card-lesson">"${ep.lesson || ''}"</div>
          <div class="ep-card-stats">
            <span class="status-tag tag-ep">${ep.scenes?.length || 0} scenes</span>
            ${(ep.scenes||[]).filter(s=>s.hasImage).length > 0 ? `<span class="status-tag tag-done">🖼️ ${(ep.scenes||[]).filter(s=>s.hasImage).length} images</span>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
    <div id="lib-ep-detail" class="hidden"></div>
  `;
}

async function openEpisode(epId) {
  const ep = state.episodes.find(e => e.id === epId);
  if (!ep) return;
  
  const c = document.getElementById('content');
  setTopbar(ep.title || 'Episode', `EP${ep.epNum || '?'} · ${ep.scenes?.length || 0} scenes`);
  
  c.innerHTML = `
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap">
      <button class="btn btn-secondary btn-sm" onclick="renderView('library')">← Back to Library</button>
      <button class="btn btn-teal btn-sm" onclick="state.currentEpId='${epId}';showView('images')">🖼️ Images Agent</button>
      <button class="btn btn-secondary btn-sm" onclick="state.currentEpId='${epId}';showView('prompts')">🎬 Video Prompts</button>
      <button class="btn btn-secondary btn-sm" style="margin-left:auto;color:var(--red);border-color:var(--red)" onclick="deleteEpisode('${epId}')">🗑️ Delete</button>
    </div>
    <div class="card" style="margin-bottom:20px">
      <div class="card-title">${ep.title}</div>
      <div style="font-style:italic;color:var(--orange);font-size:13px;margin-top:4px">"${ep.lesson}"</div>
      <div style="font-size:12px;color:var(--text-dim);margin-top:8px">Theme: ${ep.theme || 'N/A'} · Created: ${new Date(ep.created).toLocaleString()}</div>
    </div>
    <div id="lib-scenes-container"></div>
  `;
  
  const container = document.getElementById('lib-scenes-container');
  for (const s of (ep.scenes || [])) {
    const item = document.createElement('div');
    item.className = 'scene-item';
    item.id = `lib-s-${epId}-${s.id}`;
    item.innerHTML = `
      <div class="scene-num">${s.id}</div>
      <div class="scene-body">
        <div class="scene-location">📍 ${s.location} · ${(s.characters||[]).join(', ')}</div>
        <div class="scene-action">${s.action}</div>
        <div class="scene-dialogue"><span class="scene-speaker">${s.dialogue?.character||''}:</span>"${s.dialogue?.line||''}"</div>
      </div>
      <div class="scene-actions" id="lib-img-${epId}-${s.id}">
        <div class="img-placeholder">…</div>
      </div>
    `;
    container.appendChild(item);
    
    if (s.hasImage) {
      const imgData = await getImageDB(`${epId}_s${s.id}`);
      const imgContainer = document.getElementById(`lib-img-${epId}-${s.id}`);
      if (imgContainer && imgData) {
        imgContainer.innerHTML = `
          <img class="img-thumb" src="${imgData}" onclick="openImageViewer('${imgData}')" style="cursor:pointer" />
          <button class="btn btn-xs btn-secondary" onclick="downloadImage('${imgData}','EP${ep.epNum||1}_S${s.id}.png')">⬇️</button>
        `;
      }
    } else {
      const imgContainer = document.getElementById(`lib-img-${epId}-${s.id}`);
      if (imgContainer) imgContainer.innerHTML = `<div class="img-placeholder">🖼️</div>`;
    }
  }
}

function downloadImage(dataUrl, filename) {
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = filename;
  a.click();
}

function deleteEpisode(epId) {
  if (!confirm('Delete this episode? Images in library are NOT removed.')) return;
  state.episodes = state.episodes.filter(e => e.id !== epId);
  saveEpisodes();
  renderView('library');
  flash('🗑️ Episode deleted');
}

  const chars = [

      ${locs.map(l => `
        <div class="card">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
            <div style="font-size:24px">${l.emoji}</div>
            <div>
              <div class="card-title">${l.name}</div>
              <span class="status-tag tag-done">LOCKED</span>
            </div>
          </div>
          <div style="font-size:12px;color:var(--text-dim);line-height:1.6;font-family:'Space Mono',monospace;background:var(--bg);padding:10px;border-radius:4px;border:1px solid var(--border)">${l.desc}</div>

// ═══════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════
function openSettings() {
  const s = getSettings();
  document.getElementById('s-apikey').value = s.apiKey || '';
  document.getElementById('settings-modal').classList.remove('hidden');
}
function closeSettings() {
  document.getElementById('settings-modal').classList.add('hidden');
}
function saveSettings() {
  const apiKey = document.getElementById('s-apikey').value.trim();
  
  
  localStorage.setItem('cr_settings', JSON.stringify({ apiKey }));
  closeSettings();
  flash('✅ Settings saved');
  renderView(state.view);
}

// INIT
// ═══════════════════════════════════════
loadState();
updateLibCount();
renderView('dashboard');
</script>
