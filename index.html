<!-- Episode Form Section -->
<div class="form-section">
    <h3>Episode Details</h3>
    
    <label>Episode Number *</label>
    <input type="number" id="episodeNumber" value="3" required>
    
    <label>Episode Title *</label>
    <input type="text" id="episodeTitle" value="Rama Builds a BIRDHOUSE!" required>
    
    <label>Episode Theme *</label>
    <textarea id="episodeTheme" required>Rama and her pets collect recyclable materials to build a birdhouse, learning about the impact of their crafting on the local wildlife</textarea>
    
    <label>Episode Lesson *</label>
    <textarea id="episodeLesson" required>Reducing waste and reusing materials can help protect the environment and inspire creativity</textarea>
    
    <label>Story Hook *</label>
    <textarea id="episodeHook" required>What happens... when trash becomes a HOME?</textarea>
    
    <label>Scene Count</label>
    <input type="number" id="sceneCount" value="20" required>
    
    <button onclick="generateScript()">Generate Script</button>
</div>
